# Pre-commit hooks. Install with: pre-commit install
# Run all hooks manually with: pre-commit run --all-files
repos:
  # Ruff lint (pyflakes-class errors: unused imports/vars, undefined names,
  # PEP 604 unions at the py39 floor). Self-contained — pre-commit fetches the
  # pinned ruff, so it doesn't depend on a venv having ruff installed. Config
  # (target-version, select, per-file-ignores) lives in pyproject.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        name: ruff (lint)
        # No --fix: fail fast and let the dev decide, matching the pytest hook.
        files: '^(python/|fsr_playbooks/)'

  - repo: local
    hooks:
      - id: infra-leak-guard
        name: infra-leak guard (no internal hosts in tracked source)
        # Blocks 10.99.x.x, *.fortinet.com/.net, *.forticloud.com from entering
        # the public mirror. Scans staged additions only. Uses a bare python3 —
        # the script has no third-party deps, so it runs without the venv.
        entry: python3 scripts/check_infra_leaks.py
        language: system
        pass_filenames: false
        always_run: true

      - id: shape-contract-ratchet
        name: shape-contract diff (no new phantom arg-key reads)
        # Fails when a consumer stage reads a Step.arguments key no producer
        # writes — the F3 class of silent cross-stage shape disagreement. The
        # accepted-as-safe set lives in ACCEPTED_PHANTOM in the script; a NEW
        # key is what trips this. Bare python3: the script is stdlib-only (ast).
        entry: python3 tooling/typing/shape_contract_diff.py --check
        language: system
        pass_filenames: false
        files: '^fsr_playbooks/compiler/'

      - id: pytest-fast
        name: pytest (fast subset, skips corpus)
        # Use this repo's venv interpreter, NOT a bare `python3` — the system
        # python lacks the project deps (jinja2/mcp) and its editable install
        # points at a sibling checkout, so it collected the wrong repo's tests
        # and errored. The venv has fsr_playbooks installed editable (resolves to
        # THIS repo), so no PYTHONPATH is needed. Run `make sync` to create it.
        entry: .venv/bin/python -m pytest -m "not slow and not live" -q
        language: system
        pass_filenames: false
        # Only re-run when something the suite covers actually changed.
        # fsr_playbooks/ holds the compiler + MCP tools the suite exercises, so a
        # change there must trigger it too (was missing before).
        files: '^(python/|fsr_playbooks/|store/schema\.sql|examples/|pytest\.ini)'
