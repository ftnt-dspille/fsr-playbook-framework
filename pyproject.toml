[project]
name = "fsrpb"
version = "0.0.1"
description = "FortiSOAR Playbook YAML compiler + reference store"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "jsonschema>=4.21",
    "jinja2>=3.1",
    # Local sibling repo, installed editable in dev:
    #   pip install -e ../pyfsr
    "pyfsr",
    "mcp>=1.0",
]

[project.scripts]
fsrpb = "cli:main"

[tool.setuptools]
package-dir = {"" = "python"}
packages = ["probes", "compiler", "store", "e2e"]
