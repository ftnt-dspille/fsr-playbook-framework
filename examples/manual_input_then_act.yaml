# manual_input — pause execution and ask a human a question.
# Common in approval flows: bot proposes an action, user confirms.
#
# Friendly authoring form (compiler expands to canonical InputBased shape):
#   title:         prompt heading shown to the operator
#   description:   markdown body
#   options:       button list; each entry resolves to a `branches:` key
#   inputs:        optional inputVariables to collect alongside the choice
#
# Each option becomes a branch label; route by adding a sibling `branches:`
# block on the manual_input step. There is no `vars.steps.<id>.input.choice`
# at runtime — the choice IS the branch taken.

collection: Compiler Examples
description: Approval loop — ask a human, then act based on their response.
visible: true

playbooks:
  - name: Confirm Before Block
    description: Ask SOC analyst to approve a block, then act.
    steps:
      - type: start
        next: Approve block

        name: start
      - type: manual_input
        name: Approve block
        arguments:
          title: Block this IP?
          description: Click **block** to proceed, **skip** to abort.
        options:
          - display: block
            primary: true
            next: Pretend we blocked
          - display: skip
            next: Skip
      - type: set_variable
        name: Pretend we blocked
        vars:
          outcome: blocked
      - type: set_variable
        name: Skip
        vars:
          outcome: skipped
