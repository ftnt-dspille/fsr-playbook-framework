# Branching: a Decision step routes to different next-steps based on a condition.
# Each entry under `branches:` maps a `conditions[].option` label to a step id.
# The default fall-through ("else") path goes on the decision step's `next:`.
#
# `set_variable.arguments` is a flat {var_name: value} dict — the keys are
# the variables to set.

collection: Compiler Examples
description: Decision branching with high/low severity routing.
visible: true

playbooks:
  - name: Route By Severity
    description: Demonstrate decision branches.
    steps:
      - type: start
        next: Read severity

        name: start
      - type: set_variable
        name: Read severity
        next: Branch on severity

        vars:
          severity: "{{ vars.input.records[0].severity }}"
      - type: decision
        name: Branch on severity
        conditions:
          - display: high
            when: "{{ vars.severity in ['critical', 'high'] }}"
            next: Escalate to Tier 2
          - display: Else
            default: true
            next: Log low severity
      - type: set_variable
        name: Escalate to Tier 2
        vars:
          tier: "tier2"
      - type: set_variable
        name: Log low severity
        vars:
          tier: "tier1"
